name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ThreadPilot.Integration.slnx

    - name: Build
      run: dotnet build ThreadPilot.Integration.slnx --configuration Release --no-restore

    - name: Run Unit Tests
      run: dotnet test ThreadPilot.Integration.slnx --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName!~Integration" --logger "trx;LogFileName=unit-test-results.trx"
      
    - name: Run Integration Tests
      run: dotnet test ThreadPilot.Integration.slnx --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName~Integration" --logger "trx;LogFileName=integration-test-results.trx"

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/TestResults/*.trx'
        retention-days: 30

    - name: Publish InsuranceService
      run: dotnet publish src/ThreadPilot.InsuranceService/ThreadPilot.InsuranceService.csproj --configuration Release --no-build --output ./publish/InsuranceService

    - name: Publish VehicleService
      run: dotnet publish src/ThreadPilot.VehicleService/ThreadPilot.VehicleService.csproj --configuration Release --no-build --output ./publish/VehicleService

    - name: Upload InsuranceService Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InsuranceService
        path: ./publish/InsuranceService
        retention-days: 7

    - name: Upload VehicleService Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VehicleService
        path: ./publish/VehicleService
        retention-days: 7

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore ThreadPilot.Integration.slnx

    - name: Build
      run: dotnet build ThreadPilot.Integration.slnx --configuration Release --no-restore

    - name: Run dotnet format check
      run: dotnet format ThreadPilot.Integration.slnx --verify-no-changes --verbosity diagnostic

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    permissions:
      contents: read
      checks: write
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download Test Results
      uses: actions/download-artifact@v4
      with:
        name: test-results
        path: test-results

    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: 'test-results/**/*.trx'
        reporter: dotnet-trx
        fail-on-error: true